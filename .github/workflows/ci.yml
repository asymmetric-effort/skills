name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install site dependencies
        run: cd site && npm ci
      - name: Generate skill data
        run: cd site && npm run generate-data
      - name: Build site
        run: cd site && npx vite build
      - name: Copy 404.html for SPA routing
        run: cp site/dist/index.html site/dist/404.html
      - name: Run pre-deployment tests
        run: |
          cd site
          npx playwright install --with-deps chromium
          npx playwright test
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist/

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  publish-skills:
    needs: build-site
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Flatten skills
        run: node site/scripts/flatten-skills.mjs
      - name: Get version
        id: version
        run: echo "VERSION=$(cat dist/VERSION)" >> "$GITHUB_OUTPUT"
      - name: Create tarball
        run: |
          cd dist
          tar czf ../skills.tar.gz .
          cd ..
          echo "Tarball size: $(du -h skills.tar.gz | cut -f1)"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.VERSION }}"
          # Delete existing release for this version if it exists
          gh release delete "$VERSION" --yes 2>/dev/null || true
          # Create new release with tarball
          gh release create "$VERSION" \
            --title "Skills $VERSION" \
            --notes "Published skills $VERSION with $(find dist -name SKILL.md | wc -l) skills." \
            --latest \
            skills.tar.gz
      - name: Publish to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.VERSION }}"
          git checkout --orphan release-temp
          git rm -rf . || true
          cp -r dist/* .
          rm -rf dist/
          git add -A
          git commit -m "release: publish skills v${VERSION}"
          git branch -M release-temp release
          git push origin release --force

  test-install:
    needs: publish-skills
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: echo "VERSION=$(cat site/public/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Test install.sh with explicit version
        run: |
          echo "=== Test 1: Install with explicit version ==="
          mkdir -p /tmp/test-project-1
          cd /tmp/test-project-1
          sh ${{ github.workspace }}/install.sh "v${{ steps.version.outputs.VERSION }}"

      - name: Verify directory structure
        run: |
          echo "=== Test 2: Verify directory structure ==="
          cd /tmp/test-project-1
          # Must have .claude/skills/ directory
          test -d .claude/skills || (echo "FAIL: .claude/skills/ not found" && exit 1)
          echo "PASS: .claude/skills/ exists"

          # Must have VERSION file
          test -f .claude/skills/VERSION || (echo "FAIL: VERSION file not found" && exit 1)
          echo "PASS: VERSION file exists"

          # Must have skills.json index
          test -f .claude/skills/skills.json || (echo "FAIL: skills.json not found" && exit 1)
          echo "PASS: skills.json exists"

      - name: Verify skill directory format
        run: |
          echo "=== Test 3: Verify <name>/SKILL.md format ==="
          cd /tmp/test-project-1

          # Each skill must be a directory containing SKILL.md
          for skill in push-changes commit review-pr pentest audit-deps; do
            test -d ".claude/skills/${skill}" || (echo "FAIL: ${skill}/ directory not found" && exit 1)
            test -f ".claude/skills/${skill}/SKILL.md" || (echo "FAIL: ${skill}/SKILL.md not found" && exit 1)
            echo "PASS: ${skill}/SKILL.md exists"
          done

      - name: Verify skill count
        run: |
          echo "=== Test 4: Verify skill count ==="
          cd /tmp/test-project-1
          SKILL_COUNT=$(find .claude/skills -name "SKILL.md" -type f | wc -l)
          echo "Found ${SKILL_COUNT} skills"
          test "$SKILL_COUNT" -ge 20 || (echo "FAIL: Expected at least 20 skills, got ${SKILL_COUNT}" && exit 1)
          echo "PASS: ${SKILL_COUNT} skills installed"

      - name: Verify SKILL.md frontmatter
        run: |
          echo "=== Test 5: Verify SKILL.md frontmatter ==="
          cd /tmp/test-project-1

          # Each SKILL.md must have name, description, source_path fields
          for skill in push-changes pentest commit; do
            FILE=".claude/skills/${skill}/SKILL.md"
            grep -q "^name:" "$FILE" || (echo "FAIL: ${skill} missing name field" && exit 1)
            grep -q "^description:" "$FILE" || (echo "FAIL: ${skill} missing description field" && exit 1)
            grep -q "^source_path:" "$FILE" || (echo "FAIL: ${skill} missing source_path field" && exit 1)
            echo "PASS: ${skill} frontmatter valid"
          done

      - name: Verify VERSION matches
        run: |
          echo "=== Test 6: Verify VERSION matches ==="
          cd /tmp/test-project-1
          INSTALLED=$(cat .claude/skills/VERSION)
          EXPECTED="${{ steps.version.outputs.VERSION }}"
          test "$INSTALLED" = "$EXPECTED" || (echo "FAIL: VERSION mismatch: got ${INSTALLED}, expected ${EXPECTED}" && exit 1)
          echo "PASS: VERSION is ${INSTALLED}"

      - name: Test install.sh with latest
        run: |
          echo "=== Test 7: Install with 'latest' ==="
          mkdir -p /tmp/test-project-2
          cd /tmp/test-project-2
          sh ${{ github.workspace }}/install.sh latest
          SKILL_COUNT=$(find .claude/skills -name "SKILL.md" -type f | wc -l)
          test "$SKILL_COUNT" -ge 20 || (echo "FAIL: Expected at least 20 skills" && exit 1)
          echo "PASS: latest installed ${SKILL_COUNT} skills"

      - name: Test reinstall overwrites cleanly
        run: |
          echo "=== Test 8: Reinstall overwrites cleanly ==="
          cd /tmp/test-project-2
          # Add a rogue file
          echo "rogue" > .claude/skills/rogue.txt
          # Reinstall
          sh ${{ github.workspace }}/install.sh "v${{ steps.version.outputs.VERSION }}"
          # Rogue file should be gone
          test ! -f .claude/skills/rogue.txt || (echo "FAIL: rogue.txt still exists after reinstall" && exit 1)
          echo "PASS: clean reinstall"

      - name: Test invalid version fails gracefully
        run: |
          echo "=== Test 9: Invalid version fails gracefully ==="
          mkdir -p /tmp/test-project-3
          cd /tmp/test-project-3
          if sh ${{ github.workspace }}/install.sh v99.99.99 2>/dev/null; then
            echo "FAIL: should have failed for non-existent version"
            exit 1
          fi
          echo "PASS: invalid version rejected"

  pdv:
    needs: deploy
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install PDV dependencies
        run: cd site/e2e-pdv && npm ci
      - name: Install Playwright browsers
        run: cd site/e2e-pdv && npx playwright install --with-deps chromium
      - name: Wait for CDN propagation
        run: |
          for i in $(seq 1 30); do
            CONTENT=$(curl -sk "https://skills.asymmetric-effort.com/?_cb=$(date +%s%N)" | grep -oP 'assets/index-[^"]+\.js' || true)
            if [ -n "$CONTENT" ]; then
              echo "Site content confirmed after ${i}0s"
              exit 0
            fi
            echo "Attempt $i/30..."; sleep 10
          done
          echo "WARNING: CDN may still be propagating"
      - name: Run PDV tests
        run: cd site/e2e-pdv && npx playwright test
        env:
          SITE_URL: https://skills.asymmetric-effort.com
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pdv-report
          path: site/e2e-pdv/test-results/
